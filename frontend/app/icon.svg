<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 220" fill="none">
  <!-- Rods (behind beads) -->
  <rect x="67" y="51" width="7" height="142" rx="3.5" fill="#1c3a5e"/>
  <rect x="103" y="51" width="7" height="142" rx="3.5" fill="#1c3a5e"/>
  <rect x="139" y="51" width="7" height="142" rx="3.5" fill="#1c3a5e"/>

  <!-- Abacus frame -->
  <rect x="20" y="38" width="14" height="168" rx="7" fill="#1c3a5e"/>
  <rect x="20" y="38" width="145" height="14" rx="7" fill="#1c3a5e"/>
  <rect x="13" y="192" width="158" height="13" rx="6.5" fill="#1c3a5e"/>

  <!-- Upper beads (1 per rod) -->
  <ellipse cx="70"  cy="75" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="106" cy="75" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="142" cy="75" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>

  <!-- Lower beads (3 per rod) -->
  <ellipse cx="70"  cy="132" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="70"  cy="154" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="70"  cy="176" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="106" cy="132" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="106" cy="154" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="106" cy="176" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="142" cy="132" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="142" cy="154" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>
  <ellipse cx="142" cy="176" rx="22" ry="14" fill="white" stroke="#1c3a5e" stroke-width="5"/>

  <!-- Bubble tail (drawn before circle so circle masks the seam) -->
