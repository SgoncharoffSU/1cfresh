  <!-- Bubble circle -->
  <circle cx="222" cy="90" r="56" fill="white" stroke="#1c3a5e" stroke-width="6"/>

  <!-- Calculator screen -->
  <rect x="194" y="60" width="56" height="16" rx="3" fill="#1c3a5e"/>
  <!-- Button row 1 -->
  <rect x="194" y="82" width="14" height="10" rx="2" fill="#1c3a5e"/>
  <rect x="213" y="82" width="14" height="10" rx="2" fill="#1c3a5e"/>
  <rect x="232" y="82" width="14" height="10" rx="2" fill="#1c3a5e"/>
  <!-- Button row 2 -->
  <rect x="194" y="97" width="14" height="10" rx="2" fill="#1c3a5e"/>
  <rect x="213" y="97" width="14" height="10" rx="2" fill="#1c3a5e"/>
  <rect x="232" y="97" width="14" height="10" rx="2" fill="#1c3a5e"/>
  <!-- Button row 3 -->
  <rect x="194" y="112" width="14" height="10" rx="2" fill="#1c3a5e"/>
  <rect x="213" y="112" width="33" height="10" rx="2" fill="#1c3a5e"/>
